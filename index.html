<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open Games 360</title>
</head>
<body>
    <h1>Bem-vindo ao Open Games 360</h1>
    <p>Os preços são: R$ 20,00 e R$ 30,00.</p>
    <script>
    document.addEventListener('DOMContentLoaded', function() {
      var elements = document.querySelectorAll('body, body *');
      elements.forEach(function(el) {
        if (el.childNodes.length === 1 && el.childNodes[0].nodeType === 3) { // apenas texto
          var text = el.textContent;
          var pattern = /R\$ ?(\d{1,3}(?:\.\d{3})*,\d{2})/g;
          el.textContent = text.replace(pattern, function(match, value) {
            var num = parseFloat(value.replace(/\./g, '').replace(',', '.'));
            var novo = (num + 10).toFixed(2).replace('.', ',');
            return 'R$ ' + novo;
          });
        }
      });
    });
    </script>
</body>
</html>
